<!DOCTYPE html>
<html>

<head>

<title>Vehicle Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>


<body class="bg-light">


<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-dark text-white">

<h3>
🚚 Vehicle Details
</h3>

</div>



<div class="card-body">


<p><b>Registration:</b> {{ vehicle.registration_number }}</p>

<p><b>Manufacturer:</b> {{ vehicle.manufacturer }}</p>

<p><b>Model:</b> {{ vehicle.vehicle_model }}</p>

<p><b>Type:</b> {{ vehicle.vehicle_type }}</p>

<p><b>Capacity:</b> {{ vehicle.capacity }} KG</p>

<p><b>Status:</b> {{ vehicle.status }}</p>

<p><b>State:</b> {{ vehicle.state }}</p>



<a href="{% url 'vehicle_list' %}" 
class="btn btn-secondary">

Back

</a>


</div>


</div>


</div>


</body>

</html>
